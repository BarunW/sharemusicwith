name: build-and-push

# Builds the multi-stage go-wasm/Dockerfile (compiles the WASM client + server,
# embeds static assets) and pushes the image to GHCR. The staging VM then pulls
# it (`docker compose pull && up -d`) — no source build on the box, so it stays
# small and redeploys are instant.
on:
  push:
    branches: [main, staging]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name for GHCR.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # The Dockerfile and its build context live in go-wasm/.
          context: ./go-wasm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
