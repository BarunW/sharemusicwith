# ShareMusicWith — host nginx reverse proxy for staging/prod.
#
# Install on the VM:
#   sudo cp deploy/nginx/staging.conf /etc/nginx/sites-available/sharemusicwith
#   sudo ln -s /etc/nginx/sites-available/sharemusicwith /etc/nginx/sites-enabled/
#   # replace staging.example.com below with your domain, then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d staging.example.com   # issues the cert AND rewrites
#                                                  # this server block to add TLS
#
# This file is the HTTP-only starting point. `certbot --nginx` edits the live
# copy in place: it adds the `listen 443 ssl` server, the cert directives, and an
# 80 -> 443 redirect, and the certbot systemd timer re-applies them on renewal.
# The resulting TLS server is shown in the reference comment at the bottom.
#
# NOTE: the app already serves the correct `application/wasm` MIME and SPA
# fallback and binds to 127.0.0.1:8081 (docker-compose publishes it loopback-
# only), so nginx just proxies — no static root needed for staging.

upstream sharemusicwith_app {
    server 127.0.0.1:8081;
    keepalive 16;
}

# Compress proxied responses — the ~11 MB main.wasm drops to ~3 MB on the wire.
# (Brotli compresses wasm better but needs the ngx_brotli module, absent from
# stock apt nginx — optional upgrade.)
gzip on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types application/wasm application/javascript text/css application/json image/svg+xml;

server {
    listen 80;
    listen [::]:80;
    server_name staging.example.com;

    # App caps request bodies in-code (64 KiB create/update); 1m is pure headroom.
    client_max_body_size 1m;

    # Reuse upstream keepalive connections.
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location / {
        proxy_pass http://sharemusicwith_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Append (don't overwrite) so the app walks back past the trusted docker
        # hop (TRUSTED_PROXIES) to the real client IP for rate-limit + dedup.
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Tell the app the edge is HTTPS — embeds (Spotify/Apple) need a secure
        # context, and link generation depends on the scheme.
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep just above the app's 30s read/write timeouts so the app is the one
        # to cut a slow request, not nginx mid-flight.
        proxy_read_timeout    35s;
        proxy_send_timeout    35s;
        proxy_connect_timeout 5s;
    }
}

